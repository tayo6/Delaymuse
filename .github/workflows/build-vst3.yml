name: Build VST3 Win7
on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -A x64 -T v142 -DCMAKE_SYSTEM_VERSION=10.0

      - name: Build
        run: cmake --build build --config Release
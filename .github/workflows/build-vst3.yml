name: Build VST3
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Fetch deps (git)
        run: cargo fetch --verbose

      - name: Bundle VST3
        run: cargo xtask bundle --release --verbose

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-Windows
          path: target/bundled
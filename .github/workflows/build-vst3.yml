# 1. Build and bundle the VST3 using xtask
      - name: Build and Bundle VST3
        run: cargo xtask bundle delaymuse --release

      # 2. Upload the bundled .vst3 folder as an artifact
      - name: Upload VST3 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-Windows-VST3
          path: target/bundled/**/*.vst3
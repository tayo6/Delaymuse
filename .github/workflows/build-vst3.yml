name: Build Windows VST3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # 1. Use xtask to build AND bundle the VST3
      - name: Build and Bundle VST3
        run: cargo xtask bundle delaymuse --release

      # 2. Upload the bundled artifact
      - name: Upload VST3 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-Windows-VST3
          # IMPORTANT: Point directly to the bundled folder, no wildcards!
          path: target/bundled/
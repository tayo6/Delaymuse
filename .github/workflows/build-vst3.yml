name: Build VST3 Win7
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: stable, override: true }
      - uses: Swatinem/rust-cache@v2
        with: { save-if: false }
      - name: Bundle VST3
        run: cargo run --manifest-path xtask/Cargo.toml -- bundle --release --verbose
      - name: Find bundle
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Force -Directory -Filter "bundled" | Select FullName
          Get-ChildItem -Recurse -Force -Filter "*.vst3" | Select FullName
      - uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-Windows-VST3
          path: xtask/target/bundled
          if-no-files-found: error
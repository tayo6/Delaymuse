name: Build VST3
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask bundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-vst3
          path: target/bundled/**
          if-no-files-found: error
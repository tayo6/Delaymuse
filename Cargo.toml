[package]
name = "delaymuse" # must be lowercase, this is what `cargo xtask bundle delaymuse` expects
version = "0.1.0"
edition = "2021"
# add the rest of your package fields here

[lib]
name = "delaymuse"
crate-type = ["cdylib"]

[workspace]
members = ["xtask"]
resolver = "2"

[dependencies]
nih_plug = { version = "0.32" }
nih_plug_egui = { version = "0.32", features = ["widget"] }
# your other deps

#... your [features] etc
[package]
name = "delay-vst"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = { version = "0.28", features = ["default"] }
egui = "0.28"
egui_extras = { version = "0.28", features = ["all"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Document", "HtmlCanvasElement"] }
log = "0.4"

[profile.release]
opt-level = 2
lto = true

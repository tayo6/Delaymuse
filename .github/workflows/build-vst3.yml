name: Build VST3
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install latest Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          override: true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Fetch deps
        run: cargo fetch --verbose

      - name: Bundle VST3
        run: cargo xtask bundle --release --verbose

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-Windows
          path: target/bundled
name: Build Windows VST3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # 1. Build and Bundle VST3
      - name: Build and Bundle VST3
        run: cargo xtask bundle delaymuse --release

      # 2. DIAGNOSTIC: Find exactly where the files went
      - name: Locate Compiled Files
        run: |
          echo "=== SEARCHING FOR VST3 ==="
          Get-ChildItem -Path target -Recurse -Filter *.vst3 | Select-Object FullName
          echo "=== SEARCHING FOR DLL ==="
          Get-ChildItem -Path target -Recurse -Filter *.dll | Select-Object FullName
          echo "=== CHECKING BUNDLED FOLDER ==="
          if (Test-Path target/bundled) { Get-ChildItem -Path target/bundled -Recurse | Select-Object FullName } else { echo "target/bundled DOES NOT EXIST" }

      # 3. Upload the bundled folder (Removed the trailing slash to prevent v4 path errors)
      - name: Upload Bundled Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Delaymuse-Windows-VST3
          path: target/bundled

      # 4. FALLBACK: Upload the raw DLL just in case the bundler failed
      - name: Upload Raw DLL (Fallback)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Delaymuse-Raw-DLL
          path: target/release/*.dll
name: Build VST3
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          override: true

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Bundle
        run: cargo run -p xtask -- bundle --release --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-Windows
          path: target/bundled
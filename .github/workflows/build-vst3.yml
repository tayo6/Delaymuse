name: Build VST3 Win7
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: stable, override: true }
      - uses: Swatinem/rust-cache@v2
        with: { save-if: false }

      - name: Bundle VST3
        run: cargo run --manifest-path xtask/Cargo.toml -- bundle --release --verbose

      - name: Collect everything that looks like a plugin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Write-Host "Searching entire repo..."
          Get-ChildItem -Recurse -Force -Include *.dll,*.vst3,*.clap -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Found file: $($_.FullName)"
            Copy-Item $_.FullName -Destination out -Force -ErrorAction SilentlyContinue
          }
          Get-ChildItem -Recurse -Force -Directory | Where-Object { $_.Name -like "*bundled*" -or $_.Name -like "*.vst3" } | ForEach-Object {
            Write-Host "Found dir: $($_.FullName)"
            Copy-Item $_.FullName -Destination out -Recurse -Force -ErrorAction SilentlyContinue
          }
          Write-Host "=== out folder ==="
          Get-ChildItem out -Recurse | Select FullName

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-Windows-VST3
          path: out/
          if-no-files-found: error
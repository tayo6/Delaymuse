name: Build VST3

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Bundle plugin
        run: cargo xtask bundle delaymuse --release
        # if your xtask doesn't need the name argument, just use:
        # run: cargo xtask bundle --release

      - name: Debug - show what was built
        shell: pwsh
        run: |
          Get-ChildItem -Recurse target | Where-Object { $_.Name -like "*.vst3*" -or $_.Name -like "*.dll" } | Format-Table FullName

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Delaymuse-vst3-windows
          path: |
            target/bundled/**/*.vst3
            target/bundled/**/*.clap
          if-no-files-found: error